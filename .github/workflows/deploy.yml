name: Deploy MyAPP
run-name: ${{ github.actor }} is deploying MyAPP 🚀
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  Deploy-MyAPP:
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Configura o banco de dados
      - name: Setup DB schema
        uses: appleboy/ssh-action@v1.0.3 # Permite executar comandos SSh
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            which mysql || sudo apt-get install -y mysql-client
            mysql -h ${{ secrets.DB_HOST }} \
                  -u ${{ secrets.DB_USERNAME }} \
                  -p${{ secrets.DB_PASSWORD }} \
                  ${{ secrets.DB_NAME }} \
                  -e "CREATE TABLE IF NOT EXISTS People (id INT PRIMARY KEY AUTO_INCREMENT, name VARCHAR(100), age INT, cell_phone VARCHAR(15));"
                  
    # Step 3: Substitui as variáveis de ambiente no código-fonte e faz o deploy para o servidor remoto
      - name: Config BackEnd file
        run: |
          sed -i 's/_USER_/${{ secrets.DB_USERNAME }}/g' backend/myapi.py
          sed -i 's/_PASSWORD_/${{ secrets.DB_PASSWORD }}/g' backend/myapi.py
          sed -i 's/_HOST_/${{ secrets.DB_HOST }}/g' backend/myapi.py
          sed -i 's/_DBNAME_/${{ secrets.DB_NAME }}/g' backend/myapi.py

    #Step 4: Copia os arquivos para o servidor remoto e reinicia o serviço
      - name: Deploy BackEnd
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "backend/myapi.py"
          target: "/home/ubuntu/myapp/"
          strip_components: 1

    # Step 5: Substitui as variáveis de ambiente no código-fonte do FrontEnd e faz o deploy para o servidor remoto
      - name: Config FrontEnd file
        run: |
          sed -i 's/_API_ADDRESS_/${{ secrets.HOST }}/g' frontend/index.html

            
    # Step 6: Configura o servidor web para servir o FrontEnd e reinicia o serviço
      - name: Deploy FrontEnd
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "frontend/index.html"
          target: "/var/www/html/"
          strip_components: 1

    # Step 7: Reinicia o serviço para aplicar as mudanças
      - name: Restart BackEnd service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: sudo systemctl restart myapp
